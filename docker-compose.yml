version: '3.8'

services:
  timer:
    build: .
    container_name: timer-app
    ports:
      - "8080:8080"
    volumes:
      - timer-data:/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  timer-data:
