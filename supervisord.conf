[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:redis]
command=redis-server --daemonize no --appendonly yes --dir /data
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/redis.log
stderr_logfile=/var/log/supervisor/redis_err.log

[program:timer]
command=/app/timer
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/timer.log
stderr_logfile=/var/log/supervisor/timer_err.log
environment=TZ="Asia/Shanghai"
