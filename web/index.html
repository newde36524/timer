<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定时任务管理器</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-hover: #1f2b47;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #2a2a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-name {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
        }

        .stat-item {
            background: var(--bg-card);
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .filters {
            display: flex;
            gap: 1rem;
        }

        select, input {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.625rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--accent);
        }

        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .tasks-grid {
            display: grid;
            gap: 1rem;
        }

        .task-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.25rem;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .task-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .task-title {
            font-weight: 600;
            font-size: 1rem;
        }

        .task-key {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: monospace;
            margin-top: 0.25rem;
        }

        .task-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-active {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .status-paused {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .status-finished {
            background: rgba(107, 114, 128, 0.2);
            color: #9ca3af;
        }

        .task-body {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .task-info {
            text-align: center;
        }

        .task-info-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .task-info-value {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .task-url {
            background: var(--bg-secondary);
            padding: 0.75rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            word-break: break-all;
        }

        .exec-mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .exec-mode-badge.script {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #00d4ff;
            border: 1px solid #00d4ff33;
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        textarea.form-input {
            min-height: 100px;
            resize: vertical;
            font-family: monospace;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .type-selector {
            display: flex;
            gap: 0.5rem;
        }

        .type-option {
            flex: 1;
            padding: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .type-option.active {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        .type-option-label {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .type-option-desc {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1.5rem;
            max-width: 100%;
        }

        .page-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            min-width: 2.5rem;
        }

        .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* 登录页面样式 */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-box {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }

        .login-tabs {
            display: flex;
            margin-bottom: 1.5rem;
            background: var(--bg-card);
            border-radius: 8px;
            padding: 0.25rem;
        }

        .login-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .login-tab.active {
            background: var(--accent);
            color: white;
        }

        .login-form {
            display: none;
        }

        .login-form.active {
            display: block;
        }

        .login-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: var(--danger);
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            header {
                flex-direction: column;
                gap: 1rem;
            }

            .stats {
                width: 100%;
                justify-content: space-between;
            }

            .toolbar {
                flex-direction: column;
                gap: 1rem;
            }

            .filters {
                width: 100%;
                flex-wrap: wrap;
            }

            .task-body {
                grid-template-columns: repeat(2, 1fr);
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <h1 class="login-title">定时任务管理器</h1>
            <p class="login-subtitle">登录或注册以管理您的定时任务</p>
            
            <div class="login-tabs">
                <div class="login-tab active" onclick="switchLoginTab('login')">登录</div>
                <div class="login-tab" onclick="switchLoginTab('register')">注册</div>
            </div>

            <div class="login-error" id="loginError"></div>

            <!-- 登录表单 -->
            <form class="login-form active" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="loginUsername" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="loginPassword" required placeholder="请输入密码">
                </div>
                <div class="form-actions" style="justify-content: center;">
                    <button type="submit" class="btn btn-primary" style="width: 50%; padding: 0.4rem 0.8rem; font-size: 0.75rem; text-align: center;">登录</button>
                </div>
            </form>

            <!-- 注册表单 -->
            <form class="login-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="regUsername" required minlength="3" placeholder="至少3个字符">
                </div>
                <div class="form-group">
                    <label class="form-label">昵称</label>
                    <input type="text" class="form-input" id="regNickname" placeholder="可选">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="regPassword" required minlength="6" placeholder="至少6个字符">
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <input type="password" class="form-input" id="regPassword2" required placeholder="再次输入密码">
                </div>
                <div class="form-group">
                    <label class="form-label">邀请码</label>
                    <input type="text" class="form-input" id="regInviteCode" required placeholder="请输入邀请码">
                </div>
                <div class="form-actions" style="justify-content: center;">
                    <button type="submit" class="btn btn-primary" style="width: 50%; padding: 0.4rem 0.8rem; font-size: 0.75rem; text-align: center;">注册</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 主页面 -->
    <div class="container" id="mainPage" style="display: none;">
        <header>
            <h1>定时任务管理器</h1>
            <div class="user-info">
                <span class="user-name" id="currentUser"></span>
                <button class="btn btn-secondary btn-sm" onclick="logout()">退出</button>
            </div>
        </header>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="activeCount">0</div>
                <div class="stat-label">运行中</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="pausedCount">0</div>
                <div class="stat-label">已暂停</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="queueSize">0</div>
                <div class="stat-label">队列中</div>
            </div>
        </div>

        <div class="toolbar" style="margin-top: 1.5rem;">
            <div class="filters">
                <select id="statusFilter">
                    <option value="">全部状态</option>
                    <option value="1">运行中</option>
                    <option value="2">已暂停</option>
                    <option value="3">已完成</option>
                </select>
                <select id="typeFilter">
                    <option value="">全部类型</option>
                    <option value="1">一次性任务</option>
                    <option value="2">间隔执行</option>
                </select>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button class="btn btn-secondary" onclick="openTerminalModal()">
                    <span>⌨</span> 终端
                </button>
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <span>+</span> 创建任务
                </button>
            </div>
        </div>

        <div id="tasksList" class="tasks-grid"></div>

        <div id="pagination" class="pagination"></div>
    </div>

    <!-- 创建/编辑任务模态框 -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">创建任务</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskKey">
                <div class="form-group">
                    <label class="form-label">任务名称</label>
                    <input type="text" class="form-input" id="taskName" required>
                </div>

                <div class="form-group">
                    <label class="form-label">任务类型</label>
                    <div class="type-selector">
                        <div class="type-option active" data-type="1" onclick="selectType(1)">
                            <div class="type-option-label">一次性</div>
                            <div class="type-option-desc">指定时间执行一次</div>
                        </div>
                        <div class="type-option" data-type="2" onclick="selectType(2)">
                            <div class="type-option-label">间隔执行</div>
                            <div class="type-option-desc">按固定间隔重复</div>
                        </div>
                    </div>
                    <input type="hidden" id="taskType" value="1">
                </div>

                <div class="form-group">
                    <label class="form-label">执行模式</label>
                    <div class="type-selector">
                        <div class="type-option active" data-mode="1" onclick="selectExecMode(1)">
                            <div class="type-option-label">HTTP 请求</div>
                            <div class="type-option-desc">发送 HTTP 请求</div>
                        </div>
                        <div class="type-option" data-mode="2" onclick="selectExecMode(2)">
                            <div class="type-option-label">脚本执行</div>
                            <div class="type-option-desc">执行 JS/Python 代码</div>
                        </div>
                    </div>
                    <input type="hidden" id="execMode" value="1">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">首次执行时间</label>
                        <input type="datetime-local" class="form-input" id="startTime">
                    </div>
                    <div class="form-group" id="intervalGroup" style="display: none;">
                        <label class="form-label">执行间隔（秒）</label>
                        <input type="number" class="form-input" id="interval" min="1" placeholder="60">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">最大重试次数</label>
                        <input type="number" class="form-input" id="maxRetryCount" value="3" min="0">
                    </div>
                    <div class="form-group" id="maxExecGroup" style="display: none;">
                        <label class="form-label">最大执行次数（0=无限制）</label>
                        <input type="number" class="form-input" id="maxExecCount" value="0" min="0">
                    </div>
                </div>

                <!-- HTTP 请求配置 -->
                <div id="httpConfig">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">HTTP 方法</label>
                            <select class="form-input" id="httpMethod">
                                <option value="GET">GET</option>
                                <option value="POST" selected>POST</option>
                                <option value="PUT">PUT</option>
                                <option value="DELETE">DELETE</option>
                                <option value="PATCH">PATCH</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">任务分组</label>
                            <input type="text" class="form-input" id="taskGroup" value="default">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">请求 URL</label>
                        <input type="url" class="form-input" id="httpUrl" placeholder="https://example.com/api">
                    </div>

                    <div class="form-group">
                        <label class="form-label">请求头（JSON 格式）</label>
                        <textarea class="form-input" id="httpHeaders" placeholder='{"Content-Type": "application/json"}'></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">请求体</label>
                        <textarea class="form-input" id="httpBody" placeholder='{"key": "value"}'></textarea>
                    </div>
                </div>

                <!-- 脚本执行配置 -->
                <div id="scriptConfig" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">脚本语言</label>
                            <select class="form-input" id="scriptLanguage">
                                <option value="javascript">JavaScript (Node.js)</option>
                                <option value="python">Python 3</option>
                                <option value="shell">Shell (Bash)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">任务分组</label>
                            <input type="text" class="form-input" id="taskGroupScript" value="default">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">脚本代码</label>
                        <textarea class="form-input" id="scriptCode" style="min-height: 200px; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.85rem;" placeholder="// JavaScript 示例
console.log('Hello from timer!');

// Python 示例
# print('Hello from timer!')"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 日志模态框 -->
    <div class="modal-overlay" id="logsModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">执行日志 - <span id="logsTaskName"></span></h2>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <span id="logsAutoRefresh" style="font-size: 0.75rem; color: var(--success);">自动刷新中</span>
                    <button class="modal-close" onclick="closeLogsModal()">&times;</button>
                </div>
            </div>
            <div id="logsContent"></div>
            <div id="logsPagination" class="pagination"></div>
        </div>
    </div>

    <!-- 日志详情模态框 -->
    <div class="modal-overlay" id="logDetailModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">日志详情</h2>
                <button class="modal-close" onclick="closeLogDetailModal()">&times;</button>
            </div>
            <div id="logDetailContent"></div>
        </div>
    </div>

    <!-- 终端模态框 -->
    <div class="modal-overlay" id="terminalModal">
        <div class="modal" style="max-width: 900px; width: 95%;">
            <div class="modal-header">
                <h2 class="modal-title">⌨ Web 终端</h2>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <span id="terminalStatus" style="font-size: 0.75rem; color: var(--text-secondary);">未连接</span>
                    <button class="modal-close" onclick="closeTerminalModal()">&times;</button>
                </div>
            </div>
            <div id="terminalContainer" style="background: #0a0a0f; border-radius: 8px; padding: 8px; height: 500px;">
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentPage = 1;
        let editingKey = null;
        let logsRefreshTimer = null;
        let currentLogsKey = null;
        let currentLogsPage = 1;
        let cachedTasks = null; // 缓存任务列表
        let cachedLogs = null; // 缓存日志列表
        let authToken = localStorage.getItem('token');
        let currentUser = JSON.parse(localStorage.getItem('user') || 'null');

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
        });

        // 检查认证状态
        function checkAuth() {
            if (authToken && currentUser) {
                showMainPage();
            } else {
                showLoginPage();
            }
        }

        // 显示登录页面
        function showLoginPage() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('mainPage').style.display = 'none';
        }

        // 显示主页面
        function showMainPage() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
            document.getElementById('currentUser').textContent = currentUser.nickname || currentUser.username;
            
            loadTasks();
            loadStats();
            setInterval(loadStats, 5000);
            setInterval(loadTasks, 3000);
            setInterval(updateCountdowns, 1000);

            document.getElementById('statusFilter').addEventListener('change', () => {
                currentPage = 1;
                loadTasks();
            });
            document.getElementById('typeFilter').addEventListener('change', () => {
                currentPage = 1;
                loadTasks();
            });

            document.getElementById('taskForm').addEventListener('submit', handleSubmit);
        }

        // 切换登录/注册标签
        function switchLoginTab(tab) {
            document.querySelectorAll('.login-tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(el => el.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.login-tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.login-tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            document.getElementById('loginError').style.display = 'none';
        }

        // 显示登录错误
        function showLoginError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.style.display = 'block';
        }

        // 处理登录
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (res.ok) {
                    authToken = data.token;
                    currentUser = data.user;
                    localStorage.setItem('token', authToken);
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    showMainPage();
                } else {
                    showLoginError(data.error || '登录失败');
                }
            } catch (err) {
                showLoginError('网络错误，请重试');
            }
        }

        // 处理注册
        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const nickname = document.getElementById('regNickname').value;
            const password = document.getElementById('regPassword').value;
            const password2 = document.getElementById('regPassword2').value;
            const inviteCode = document.getElementById('regInviteCode').value;

            if (password !== password2) {
                showLoginError('两次输入的密码不一致');
                return;
            }

            if (!inviteCode) {
                showLoginError('请输入邀请码');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, nickname, password, invite_code: inviteCode })
                });

                const data = await res.json();
                if (res.ok) {
                    alert('注册成功，请登录');
                    switchLoginTab('login');
                    document.getElementById('loginUsername').value = username;
                } else {
                    showLoginError(data.error || '注册失败');
                }
            } catch (err) {
                showLoginError('网络错误，请重试');
            }
        }

        // 退出登录
        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            showLoginPage();
        }

        // 带认证的请求
        async function authFetch(url, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${authToken}`,
                ...(options.headers || {})
            };
            
            const res = await fetch(url, { ...options, headers });
            
            if (res.status === 401) {
                logout();
                return null;
            }
            
            return res;
        }

        // 加载任务列表
        async function loadTasks() {
            const status = document.getElementById('statusFilter').value;
            const type = document.getElementById('typeFilter').value;

            let url = `${API_BASE}/tasks?page=${currentPage}&page_size=10`;
            if (status) url += `&status=${status}`;
            if (type) url += `&type=${type}`;

            try {
                const res = await authFetch(url);
                if (!res) return;
                const data = await res.json();

                let tasks = data.data || [];
                tasks.sort((a, b) => a.next_exec_time - b.next_exec_time);

                // 比较新旧数据，只有变化时才重新渲染
                if (!cachedTasks || tasksChanged(cachedTasks, tasks)) {
                    cachedTasks = tasks;
                    renderTasks(tasks);
                    renderPagination(data.pagination || {});
                }
            } catch (err) {
                console.error('Failed to load tasks:', err);
            }
        }

        // 比较任务列表是否有变化
        function tasksChanged(oldTasks, newTasks) {
            if (oldTasks.length !== newTasks.length) return true;
            
            for (let i = 0; i < oldTasks.length; i++) {
                const oldTask = oldTasks[i];
                const newTask = newTasks[i];
                // 比较关键字段
                if (oldTask.key !== newTask.key ||
                    oldTask.status !== newTask.status ||
                    oldTask.exec_count !== newTask.exec_count ||
                    oldTask.name !== newTask.name ||
                    oldTask.http_url !== newTask.http_url) {
                    return true;
                }
            }
            return false;
        }

        // 渲染任务列表
        function renderTasks(tasks) {
            const container = document.getElementById('tasksList');

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div>暂无任务</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = tasks.map(task => {
                // 根据执行模式显示不同的信息
                let execInfo = '';
                if (task.exec_mode === 2) {
                    // 脚本执行模式
                    let langIcon, langName;
                    switch (task.script_language) {
                        case 'python':
                            langIcon = '🐍';
                            langName = 'Python';
                            break;
                        case 'shell':
                            langIcon = '🐚';
                            langName = 'Shell';
                            break;
                        default:
                            langIcon = '📜';
                            langName = 'JavaScript';
                    }
                    execInfo = `<span class="exec-mode-badge script">${langIcon} ${langName}</span>`;
                } else {
                    // HTTP 请求模式
                    execInfo = `<strong>${task.http_method}</strong> ${escapeHtml(task.http_url || '')}`;
                }
                
                return `
                <div class="task-card" data-next-exec="${task.next_exec_time}">
                    <div class="task-header">
                        <div>
                            <div class="task-title">${escapeHtml(task.name)}</div>
                            <div class="task-key">${escapeHtml(task.key)}</div>
                        </div>
                        <span class="task-status status-${getStatusClass(task.status)}">${task.status_desc}</span>
                    </div>
                    <div class="task-body">
                        <div class="task-info">
                            <div class="task-info-label">类型</div>
                            <div class="task-info-value">${task.type_desc}</div>
                        </div>
                        <div class="task-info">
                            <div class="task-info-label">下次执行</div>
                            <div class="task-info-value next-exec-time" data-time="${task.next_exec_time}" title="${formatTime(task.next_exec_time)}">${formatCountdown(task.next_exec_time)}</div>
                            <div class="task-info-label" style="font-size: 0.65rem; margin-top: 2px;">${formatTime(task.next_exec_time)}</div>
                        </div>
                        <div class="task-info">
                            <div class="task-info-label">已执行</div>
                            <div class="task-info-value">${task.exec_count}次</div>
                        </div>
                    </div>
                    <div class="task-url">
                        ${execInfo}
                    </div>
                    <div class="task-actions">
                        <button class="btn btn-sm btn-secondary" onclick="viewLogs('${task.key}')">日志</button>
                        <button class="btn btn-sm btn-primary" onclick="retryTask('${task.key}')">重试</button>
                        ${task.status === 1 ? 
                            `<button class="btn btn-sm btn-warning" onclick="pauseTask('${task.key}')">暂停</button>` :
                            task.status === 2 ? 
                            `<button class="btn btn-sm btn-success" onclick="resumeTask('${task.key}')">恢复</button>` : ''
                        }
                        <button class="btn btn-sm btn-secondary" onclick="editTask('${task.key}')">编辑</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteTask('${task.key}')">删除</button>
                    </div>
                </div>
            `}).join('');
        }

        // 渲染分页
        function renderPagination(pagination) {
            const container = document.getElementById('pagination');
            const { page, total_page } = pagination;

            if (!total_page || total_page <= 1) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = renderPageButtons(page, total_page, 'goToPage');
        }

        // 渲染分页按钮（通用）
        function renderPageButtons(currentPage, totalPages, clickHandler) {
            let html = '';
            const maxVisible = 5; // 最多显示5个页码按钮
            
            if (totalPages <= maxVisible) {
                // 页数少，全部显示
                for (let i = 1; i <= totalPages; i++) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="${clickHandler}(${i})">${i}</button>`;
                }
            } else {
                // 页数多，显示部分
                // 第一页
                html += `<button class="page-btn ${1 === currentPage ? 'active' : ''}" onclick="${clickHandler}(1)">1</button>`;
                
                // 计算中间显示的页码
                let start = Math.max(2, currentPage - 1);
                let end = Math.min(totalPages - 1, currentPage + 1);
                
                // 确保中间至少显示3个页码
                if (end - start < 2) {
                    if (start === 2) {
                        end = Math.min(totalPages - 1, start + 2);
                    } else {
                        start = Math.max(2, end - 2);
                    }
                }
                
                // 省略号（左）
                if (start > 2) {
                    html += `<span class="page-btn" style="cursor: default; border: none;">...</span>`;
                }
                
                // 中间页码
                for (let i = start; i <= end; i++) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="${clickHandler}(${i})">${i}</button>`;
                }
                
                // 省略号（右）
                if (end < totalPages - 1) {
                    html += `<span class="page-btn" style="cursor: default; border: none;">...</span>`;
                }
                
                // 最后一页
                html += `<button class="page-btn ${totalPages === currentPage ? 'active' : ''}" onclick="${clickHandler}(${totalPages})">${totalPages}</button>`;
            }
            
            return html;
        }

        // 加载统计
        async function loadStats() {
            try {
                const res = await authFetch(`${API_BASE}/stats`);
                if (!res) return;
                const data = await res.json();
                document.getElementById('activeCount').textContent = data.active_tasks || 0;
                document.getElementById('pausedCount').textContent = data.paused_tasks || 0;
                document.getElementById('queueSize').textContent = data.queue_size || 0;
            } catch (err) {
                console.error('Failed to load stats:', err);
            }
        }

        // 打开创建模态框
        async function openCreateModal() {
            editingKey = null;
            document.getElementById('modalTitle').textContent = '创建任务';
            document.getElementById('taskForm').reset();
            document.getElementById('taskType').value = '1';
            selectType(1);
            await generateKey();
            // 设置首次执行时间默认为当前时间（使用本地时区）
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const localDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;
            document.getElementById('startTime').value = localDateTime;
            document.getElementById('taskModal').classList.add('active');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
        }

        // 选择任务类型
        function selectType(type) {
            document.querySelectorAll('.type-option[data-type]').forEach(el => el.classList.remove('active'));
            document.querySelector(`.type-option[data-type="${type}"]`).classList.add('active');
            document.getElementById('taskType').value = type;

            const intervalGroup = document.getElementById('intervalGroup');
            const maxExecGroup = document.getElementById('maxExecGroup');

            if (type === 1) {
                intervalGroup.style.display = 'none';
                maxExecGroup.style.display = 'none';
            } else {
                intervalGroup.style.display = 'block';
                maxExecGroup.style.display = 'block';
            }
        }

        // 选择执行模式
        function selectExecMode(mode) {
            document.querySelectorAll('.type-option[data-mode]').forEach(el => el.classList.remove('active'));
            document.querySelector(`.type-option[data-mode="${mode}"]`).classList.add('active');
            document.getElementById('execMode').value = mode;

            const httpConfig = document.getElementById('httpConfig');
            const scriptConfig = document.getElementById('scriptConfig');

            if (mode === 1) {
                httpConfig.style.display = 'block';
                scriptConfig.style.display = 'none';
            } else {
                httpConfig.style.display = 'none';
                scriptConfig.style.display = 'block';
            }
        }

        // 生成 Key
        async function generateKey() {
            try {
                const res = await authFetch(`${API_BASE}/generate-key`);
                if (!res) return;
                const data = await res.json();
                document.getElementById('taskKey').value = data.key;
            } catch (err) {
                const key = Math.random().toString(36).substring(2, 10);
                document.getElementById('taskKey').value = key;
            }
        }

        // 提交表单
        async function handleSubmit(e) {
            e.preventDefault();

            const type = parseInt(document.getElementById('taskType').value);
            const execMode = parseInt(document.getElementById('execMode').value);
            const startTimeStr = document.getElementById('startTime').value;
            const startTime = startTimeStr ? new Date(startTimeStr).getTime() / 1000 : Date.now() / 1000;

            let key = document.getElementById('taskKey').value;
            if (!key) {
                key = Math.random().toString(36).substring(2, 10);
            }

            const taskData = {
                name: document.getElementById('taskName').value,
                key: key,
                type: type,
                exec_mode: execMode,
                start_time: Math.floor(startTime),
                interval: type !== 1 ? parseInt(document.getElementById('interval').value) || 60 : 0,
                max_retry_count: parseInt(document.getElementById('maxRetryCount').value) || 3,
                max_exec_count: type !== 1 ? parseInt(document.getElementById('maxExecCount').value) || 0 : 0,
            };

            // 根据执行模式添加不同的配置
            if (execMode === 1) {
                // HTTP 请求模式
                taskData.http_method = document.getElementById('httpMethod').value;
                taskData.http_url = document.getElementById('httpUrl').value;
                taskData.http_headers = parseHeaders(document.getElementById('httpHeaders').value);
                taskData.http_body = document.getElementById('httpBody').value;
                taskData.group = document.getElementById('taskGroup').value || 'default';
            } else {
                // 脚本执行模式
                taskData.script_language = document.getElementById('scriptLanguage').value;
                taskData.script_code = document.getElementById('scriptCode').value;
                taskData.group = document.getElementById('taskGroupScript').value || 'default';
            }

            try {
                let res;
                if (editingKey) {
                    res = await authFetch(`${API_BASE}/tasks/${editingKey}`, {
                        method: 'PUT',
                        body: JSON.stringify(taskData)
                    });
                } else {
                    res = await authFetch(`${API_BASE}/tasks`, {
                        method: 'POST',
                        body: JSON.stringify(taskData)
                    });
                }

                if (!res) return;

                if (res.ok) {
                    closeModal();
                    loadTasks();
                    loadStats();
                } else {
                    const err = await res.json();
                    alert(err.error || '操作失败');
                }
            } catch (err) {
                alert('请求失败: ' + err.message);
            }
        }

        // 编辑任务
        async function editTask(key) {
            try {
                const res = await authFetch(`${API_BASE}/tasks/${key}`);
                if (!res) return;
                const data = await res.json();
                const task = data.data;

                editingKey = key;
                document.getElementById('modalTitle').textContent = '编辑任务';
                document.getElementById('taskName').value = task.name;
                document.getElementById('taskKey').value = task.key;
                selectType(task.type);
                
                // 设置执行模式
                if (task.exec_mode) {
                    selectExecMode(task.exec_mode);
                }
                
                document.getElementById('startTime').value = formatDateTimeLocal(task.start_time);
                document.getElementById('interval').value = task.interval || '';
                document.getElementById('maxRetryCount').value = task.max_retry_count;
                document.getElementById('maxExecCount').value = task.max_exec_count;
                
                // HTTP 配置
                document.getElementById('httpMethod').value = task.http_method || 'POST';
                document.getElementById('httpUrl').value = task.http_url || '';
                document.getElementById('httpHeaders').value = task.http_headers ? JSON.stringify(task.http_headers, null, 2) : '';
                document.getElementById('httpBody').value = task.http_body || '';
                document.getElementById('taskGroup').value = task.group || 'default';
                
                // 脚本配置
                document.getElementById('scriptLanguage').value = task.script_language || 'javascript';
                document.getElementById('scriptCode').value = task.script_code || '';
                document.getElementById('taskGroupScript').value = task.group || 'default';

                document.getElementById('taskModal').classList.add('active');
            } catch (err) {
                alert('加载任务失败: ' + err.message);
            }
        }

        // 删除任务
        async function deleteTask(key) {
            if (!confirm('确定要删除这个任务吗？')) return;

            try {
                const res = await authFetch(`${API_BASE}/tasks/${key}`, { method: 'DELETE' });
                if (res && res.ok) {
                    loadTasks();
                    loadStats();
                }
            } catch (err) {
                alert('删除失败: ' + err.message);
            }
        }

        // 暂停任务
        async function pauseTask(key) {
            try {
                const res = await authFetch(`${API_BASE}/tasks/${key}/pause`, { method: 'POST' });
                if (res && res.ok) {
                    loadTasks();
                    loadStats();
                }
            } catch (err) {
                alert('暂停失败: ' + err.message);
            }
        }

        // 恢复任务
        async function resumeTask(key) {
            try {
                const res = await authFetch(`${API_BASE}/tasks/${key}/resume`, { method: 'POST' });
                if (res && res.ok) {
                    loadTasks();
                    loadStats();
                }
            } catch (err) {
                alert('恢复失败: ' + err.message);
            }
        }

        // 手动重试任务
        async function retryTask(key) {
            try {
                const res = await authFetch(`${API_BASE}/tasks/${key}/retry`, { method: 'POST' });
                if (res && res.ok) {
                    // 自动打开日志窗口
                    if (currentLogsKey !== key) {
                        viewLogs(key);
                    } else {
                        // 如果日志窗口已打开，延迟刷新等待执行
                        setTimeout(() => {
                            refreshLogs();
                        }, 1000);
                    }
                } else {
                    const err = await res.json();
                    alert(err.error || '重试失败');
                }
            } catch (err) {
                alert('重试失败: ' + err.message);
            }
        }

        // 查看日志
        async function viewLogs(key) {
            currentLogsKey = key;
            currentLogsPage = 1;
            document.getElementById('logsTaskName').textContent = key;
            document.getElementById('logsModal').classList.add('active');
            document.getElementById('logsAutoRefresh').style.display = 'inline';
            
            await refreshLogs();
            
            if (logsRefreshTimer) {
                clearInterval(logsRefreshTimer);
            }
            logsRefreshTimer = setInterval(refreshLogs, 2000);
        }

        // 刷新日志
        async function refreshLogs() {
            if (!currentLogsKey) return;
            
            try {
                const res = await authFetch(`${API_BASE}/tasks/${currentLogsKey}/logs?page=${currentLogsPage}&page_size=5`);
                if (!res) return;
                const data = await res.json();

                const container = document.getElementById('logsContent');
                if (!data.data || data.data.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无执行日志</div>';
                    document.getElementById('logsPagination').innerHTML = '';
                    cachedLogs = null;
                } else {
                    // 比较新旧数据，只有变化时才重新渲染
                    if (!cachedLogs || logsChanged(cachedLogs, data.data)) {
                        cachedLogs = data.data;
                        container.innerHTML = data.data.map((log, index) => `
                            <div class="task-card" style="margin-bottom: 0.5rem;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                    <span>${formatTime(log.exec_time)}</span>
                                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                                        <span class="task-status status-${log.success ? 'active' : 'paused'}">${log.success ? '成功' : '失败'}</span>
                                        <button class="btn btn-sm btn-secondary" onclick="showLogDetail(${index})">详情</button>
                                    </div>
                                </div>
                                <div style="font-size: 0.8rem; color: var(--text-secondary);">
                                    状态码: ${log.status_code} | 重试: ${log.retry_count}次 | ${escapeHtml(truncateText(log.message, 50))}
                                </div>
                            </div>
                        `).join('');
                        
                        window.currentLogs = data.data;
                        renderLogsPagination(data.pagination || {});
                    }
                }
            } catch (err) {
                console.error('刷新日志失败:', err);
            }
        }

        // 比较日志列表是否有变化
        function logsChanged(oldLogs, newLogs) {
            if (oldLogs.length !== newLogs.length) return true;
            
            for (let i = 0; i < oldLogs.length; i++) {
                const oldLog = oldLogs[i];
                const newLog = newLogs[i];
                if (oldLog.id !== newLog.id ||
                    oldLog.success !== newLog.success ||
                    oldLog.status_code !== newLog.status_code ||
                    oldLog.exec_time !== newLog.exec_time) {
                    return true;
                }
            }
            return false;
        }

        // 渲染日志分页
        function renderLogsPagination(pagination) {
            const container = document.getElementById('logsPagination');
            const { page, total_page } = pagination;

            if (!total_page || total_page <= 1) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = renderPageButtons(page, total_page, 'goToLogsPage');
        }

        // 跳转日志页面
        function goToLogsPage(page) {
            currentLogsPage = page;
            refreshLogs();
        }

        // 截断文本
        function truncateText(text, maxLen) {
            if (!text) return '';
            if (text.length <= maxLen) return text;
            return text.substring(0, maxLen) + '...';
        }

        // 显示日志详情
        function showLogDetail(index) {
            if (!window.currentLogs || !window.currentLogs[index]) return;
            
            const log = window.currentLogs[index];
            const container = document.getElementById('logDetailContent');
            
            container.innerHTML = `
                <div style="margin-bottom: 1rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                        <span style="color: var(--text-secondary);">执行时间</span>
                        <span>${formatTime(log.exec_time)}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                        <span style="color: var(--text-secondary);">执行状态</span>
                        <span class="task-status status-${log.success ? 'active' : 'paused'}">${log.success ? '成功' : '失败'}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                        <span style="color: var(--text-secondary);">HTTP 状态码</span>
                        <span>${log.status_code}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                        <span style="color: var(--text-secondary);">重试次数</span>
                        <span>${log.retry_count}</span>
                    </div>
                </div>
                ${log.exec_command ? `
                <div style="margin-bottom: 0.5rem; color: var(--text-secondary);">执行命令：</div>
                <div style="background: var(--bg-primary); padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 0.8rem; word-break: break-all; white-space: pre-wrap; max-height: 200px; overflow-y: auto; margin-bottom: 1rem;">
${escapeHtml(log.exec_command)}
                </div>
                ` : ''}
                <div style="margin-bottom: 0.5rem; color: var(--text-secondary);">执行结果：</div>
                <div style="background: var(--bg-primary); padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 0.8rem; word-break: break-all; white-space: pre-wrap; max-height: 400px; overflow-y: auto;">
${escapeHtml(log.message) || '无'}
                </div>
            `;
            
            document.getElementById('logDetailModal').classList.add('active');
        }

        // 关闭日志模态框
        function closeLogsModal() {
            document.getElementById('logsModal').classList.remove('active');
            if (logsRefreshTimer) {
                clearInterval(logsRefreshTimer);
                logsRefreshTimer = null;
            }
            currentLogsKey = null;
        }

        // 关闭日志详情模态框
        function closeLogDetailModal() {
            document.getElementById('logDetailModal').classList.remove('active');
        }

        // 跳转页面
        function goToPage(page) {
            currentPage = page;
            loadTasks();
        }

        // 工具函数
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
        }

        function formatCountdown(timestamp) {
            if (!timestamp) return '-';
            const now = Math.floor(Date.now() / 1000);
            const diff = timestamp - now;
            
            if (diff <= 0) {
                return '即将执行';
            }
            
            const days = Math.floor(diff / 86400);
            const hours = Math.floor((diff % 86400) / 3600);
            const minutes = Math.floor((diff % 3600) / 60);
            const seconds = diff % 60;
            
            if (days > 0) {
                return `${days}天${hours}时${minutes}分`;
            } else if (hours > 0) {
                return `${hours}时${minutes}分${seconds}秒`;
            } else if (minutes > 0) {
                return `${minutes}分${seconds}秒`;
            } else {
                return `${seconds}秒`;
            }
        }

        function updateCountdowns() {
            document.querySelectorAll('.next-exec-time').forEach(el => {
                const timestamp = parseInt(el.dataset.time);
                if (timestamp) {
                    el.textContent = formatCountdown(timestamp);
                }
            });
        }

        function formatDateTimeLocal(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp * 1000);
            // 使用中国时区格式化为 YYYY-MM-DDTHH:mm 格式
            const options = { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
            const parts = new Intl.DateTimeFormat('zh-CN', options).formatToParts(date);
            const getPart = (type) => parts.find(p => p.type === type)?.value || '';
            return `${getPart('year')}-${getPart('month')}-${getPart('day')}T${getPart('hour')}:${getPart('minute')}`;
        }

        function getStatusClass(status) {
            switch (status) {
                case 1: return 'active';
                case 2: return 'paused';
                case 3: return 'finished';
                default: return 'active';
            }
        }

        function parseHeaders(str) {
            if (!str || !str.trim()) return {};
            try {
                return JSON.parse(str);
            } catch {
                return {};
            }
        }

        // 终端相关函数
        let terminal = null;
        let terminalSocket = null;
        let terminalFitAddon = null;
        let terminalDataDisposer = null;
        let terminalResizeDisposer = null;
        let terminalReconnectTimer = null;

        function openTerminalModal() {
            document.getElementById('terminalModal').classList.add('active');
            
            // 初始化终端
            if (!terminal) {
                initTerminal();
            } else {
                // 重新连接
                connectTerminal();
            }
        }

        function closeTerminalModal() {
            document.getElementById('terminalModal').classList.remove('active');
            
            // 清除重连定时器
            if (terminalReconnectTimer) {
                clearTimeout(terminalReconnectTimer);
                terminalReconnectTimer = null;
            }
            
            // 断开 WebSocket 连接
            if (terminalSocket) {
                terminalSocket.close();
                terminalSocket = null;
            }
        }

        function initTerminal() {
            const container = document.getElementById('terminalContainer');
            
            // 创建终端
            terminal = new Terminal({
                theme: {
                    background: '#0a0a0f',
                    foreground: '#e5e7eb',
                    cursor: '#22c55e',
                    cursorAccent: '#0a0a0f',
                    selection: 'rgba(99, 102, 241, 0.3)',
                    black: '#1a1a2e',
                    red: '#ef4444',
                    green: '#22c55e',
                    yellow: '#f59e0b',
                    blue: '#3b82f6',
                    magenta: '#a855f7',
                    cyan: '#06b6d4',
                    white: '#e5e7eb',
                    brightBlack: '#6b7280',
                    brightRed: '#f87171',
                    brightGreen: '#4ade80',
                    brightYellow: '#fbbf24',
                    brightBlue: '#60a5fa',
                    brightMagenta: '#c084fc',
                    brightCyan: '#22d3ee',
                    brightWhite: '#ffffff'
                },
                fontFamily: '"Cascadia Code", "Fira Code", "Consolas", "Monaco", monospace',
                fontSize: 14,
                lineHeight: 1.2,
                cursorBlink: true,
                cursorStyle: 'block',
                scrollback: 5000,
                allowTransparency: true
            });

            // 加载插件
            terminalFitAddon = new FitAddon.FitAddon();
            terminal.loadAddon(terminalFitAddon);
            terminal.loadAddon(new WebLinksAddon.WebLinksAddon());

            // 打开终端
            terminal.open(container);
            terminalFitAddon.fit();

            // 窗口大小改变时调整终端大小
            window.addEventListener('resize', () => {
                if (terminalFitAddon) {
                    terminalFitAddon.fit();
                }
            });

            // 连接 WebSocket
            connectTerminal();
        }

        function connectTerminal() {
            if (!terminal) return;

            // 清除之前的监听器
            if (terminalDataDisposer) {
                terminalDataDisposer.dispose();
                terminalDataDisposer = null;
            }
            if (terminalResizeDisposer) {
                terminalResizeDisposer.dispose();
                terminalResizeDisposer = null;
            }

            const statusEl = document.getElementById('terminalStatus');
            statusEl.textContent = '连接中...';
            statusEl.style.color = '#f59e0b';

            // 创建 WebSocket 连接
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/api/ws/terminal?token=${authToken}`;
            
            terminalSocket = new WebSocket(wsUrl);

            terminalSocket.onopen = () => {
                statusEl.textContent = '已连接';
                statusEl.style.color = '#22c55e';
                
                // 清屏并显示欢迎信息
                terminal.clear();
                terminal.writeln('\x1b[32mWeb Terminal v2.0\x1b[0m');
                terminal.writeln('\x1b[90m已连接到容器终端，输入命令并按回车执行。\x1b[0m');
                terminal.writeln('');
                
                // 聚焦终端
                terminal.focus();
                
                // 调整大小
                if (terminalFitAddon) {
                    terminalFitAddon.fit();
                }
            };

            terminalSocket.onmessage = (event) => {
                // 接收终端输出
                terminal.write(event.data);
            };

            terminalSocket.onclose = (event) => {
                statusEl.textContent = '已断开';
                statusEl.style.color = '#ef4444';
                
                terminal.writeln('');
                terminal.writeln('\x1b[33m连接已断开，3秒后自动重连...\x1b[0m');
                
                // 自动重连
                terminalReconnectTimer = setTimeout(() => {
                    if (document.getElementById('terminalModal').classList.contains('active')) {
                        terminal.writeln('\x1b[90m正在重新连接...\x1b[0m');
                        connectTerminal();
                    }
                }, 3000);
            };

            terminalSocket.onerror = (error) => {
                statusEl.textContent = '连接错误';
                statusEl.style.color = '#ef4444';
                terminal.writeln('\x1b[31m连接错误\x1b[0m');
            };

            // 发送用户输入到服务器（保存 disposer）
            terminalDataDisposer = terminal.onData((data) => {
                if (terminalSocket && terminalSocket.readyState === WebSocket.OPEN) {
                    terminalSocket.send(data);
                }
            });

            // 处理终端大小变化（保存 disposer）
            terminalResizeDisposer = terminal.onResize(({ cols, rows }) => {
                if (terminalSocket && terminalSocket.readyState === WebSocket.OPEN) {
                    terminalSocket.send(JSON.stringify({ type: 'resize', cols, rows }));
                }
            });
        }
    </script>
</body>
</html>
